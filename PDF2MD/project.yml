# XcodeGen specification for PDF2MD.
#
# This file is the canonical definition of the Xcode project. A pre-generated
# PDF2MD.xcodeproj is committed for convenience, but if it ever fails to open
# on your Xcode version, regenerate it from here:
#
#     brew install xcodegen      # one-time
#     cd PDF2MD
#     xcodegen generate
#     open PDF2MD.xcodeproj
#
name: PDF2MD
options:
  bundleIdPrefix: com.johnjanney
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  PDF2MD:
    type: application
    platform: macOS
    sources:
      - path: PDF2MD
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johnjanney.pdf2md
        PRODUCT_NAME: PDF2MD
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_ENTITLEMENTS: PDF2MD/App/PDF2MD.entitlements
        ENABLE_HARDENED_RUNTIME: "YES"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 John Janney. MIT License."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: "YES"

  PDF2MDTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PDF2MDTests
    dependencies:
      - target: PDF2MD
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johnjanney.pdf2md.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PDF2MD.app/Contents/MacOS/PDF2MD"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  PDF2MD:
    build:
      targets:
        PDF2MD: all
        PDF2MDTests: [test]
    test:
      targets:
        - PDF2MDTests
